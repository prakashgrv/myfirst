<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollegeGuide AI — Your College Advisor</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #4f46e5;
      --primary-dk: #3730a3;
      --bg:         #f8f9ff;
      --surface:    #ffffff;
      --border:     #e2e4ef;
      --text:       #1e1b4b;
      --muted:      #6b7280;
      --user-bg:    #4f46e5;
      --ai-bg:      #ffffff;
      --radius:     14px;
      --shadow:     0 2px 12px rgba(79,70,229,.12);
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ───────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

    /* ── Header ───────────────────────────────────────── */
    header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .brand { flex: 1; }
    .brand h1 { font-size: 17px; font-weight: 700; color: var(--text); }
    .brand p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .admin-link {
      font-size: 13px; color: var(--primary); text-decoration: none;
      border: 1px solid var(--primary); border-radius: 8px;
      padding: 5px 12px; white-space: nowrap;
      transition: background .15s;
    }
    .admin-link:hover { background: #ede9fe; }

    /* ── Messages ─────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex; gap: 10px; max-width: 80%;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai    { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; align-self: flex-end;
    }
    .msg.user .avatar { background: var(--user-bg); color: #fff; }
    .msg.ai   .avatar { background: #ede9fe; }

    .bubble {
      padding: 12px 16px; border-radius: var(--radius);
      line-height: 1.6; font-size: 15px; word-wrap: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--ai-bg); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    /* Markdown-like formatting inside AI bubbles */
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble code {
      background: #f3f4f6; padding: 2px 5px;
      border-radius: 4px; font-size: 13px; font-family: monospace;
    }
    .bubble pre { background: #1e1b4b; color: #e0e7ff; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble p { margin: 6px 0; }
    .bubble h3, .bubble h4 { font-weight: 700; margin: 10px 0 4px; }
    .bubble a { color: var(--primary); }

    /* ── Status indicators ────────────────────────────── */
    .searching-indicator {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); padding: 4px 0;
    }
    .dot-pulse { display: flex; gap: 4px; }
    .dot-pulse span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary); animation: pulse 1.2s infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: .2s; }
    .dot-pulse span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── Welcome screen ───────────────────────────────── */
    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      padding: 40px 20px; text-align: center;
    }
    #welcome .hero { font-size: 48px; }
    #welcome h2 { font-size: 22px; font-weight: 700; color: var(--text); }
    #welcome p  { font-size: 15px; color: var(--muted); max-width: 480px; line-height: 1.6; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 14px; font-size: 13px; cursor: pointer;
      transition: border-color .15s, background .15s; color: var(--text);
    }
    .chip:hover { border-color: var(--primary); background: #ede9fe; color: var(--primary); }

    /* ── Input area ───────────────────────────────────── */
    .input-area {
      padding: 14px 20px; background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--primary); }
    #userInput {
      flex: 1; border: none; background: transparent; outline: none;
      font-size: 15px; color: var(--text); resize: none;
      min-height: 24px; max-height: 160px; line-height: 1.5;
      font-family: inherit;
    }
    #userInput::placeholder { color: var(--muted); }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background .15s, opacity .15s; flex-shrink: 0;
    }
    #micBtn {
      background: transparent; color: var(--muted);
    }
    #micBtn:hover { background: #f3f4f6; color: var(--text); }
    #micBtn.active { background: #fee2e2; color: #ef4444; }
    #sendBtn {
      background: var(--primary); color: #fff;
    }
    #sendBtn:hover { background: var(--primary-dk); }
    #sendBtn:disabled { opacity: .4; cursor: default; }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: center; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🎓</div>
    <div class="brand">
      <h1>CollegeGuide AI</h1>
      <p>Your personal college advisor — powered by Claude</p>
    </div>
    <a class="admin-link" href="/admin.html">⚙ Admin</a>
  </header>

  <div id="messages">
    <div id="welcome">
      <div class="hero">🎓</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything about college admissions, essays, financial aid, scholarships, or finding the right school for you.</p>
      <div class="chips">
        <button class="chip" onclick="useChip(this)">How do I build my college list?</button>
        <button class="chip" onclick="useChip(this)">Tips for my Common App essay</button>
        <button class="chip" onclick="useChip(this)">How does financial aid work?</button>
        <button class="chip" onclick="useChip(this)">What extracurriculars look good for top schools?</button>
        <button class="chip" onclick="useChip(this)">SAT vs ACT — which should I take?</button>
        <button class="chip" onclick="useChip(this)">How to handle a waitlist decision?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="btn-icon" id="micBtn" title="Voice input" onclick="toggleMic()">🎤</button>
      <textarea id="userInput" placeholder="Ask about colleges, essays, financial aid…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-icon" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line · 🎤 for voice</p>
  </div>
</div>

<script>
  /* ── State ──────────────────────────────────────────── */
  const history = [];
  let isStreaming = false;
  let recognition = null;
  let isListening = false;

  /* ── DOM refs ───────────────────────────────────────── */
  const messagesEl = document.getElementById('messages');
  const welcomeEl  = document.getElementById('welcome');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const micBtn     = document.getElementById('micBtn');

  /* ── Auto-resize textarea ───────────────────────────── */
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  /* ── Chip shortcuts ─────────────────────────────────── */
  function useChip(btn) {
    inputEl.value = btn.textContent.trim();
    autoResize(inputEl);
    inputEl.focus();
  }

  /* ── Key handler ────────────────────────────────────── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  /* ── Render markdown-ish text ───────────────────────── */
  function renderMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/^#{1,3}\s+(.+)$/gm,'<h4>$1</h4>')
      .replace(/^\s*[-*]\s+(.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n+/g,'</p><p>')
      .replace(/\n/g,'<br>')
      .replace(/^(?!<[uoh])/,'<p>')
      + '</p>';
  }

  /* ── Append a message bubble ────────────────────────── */
  function appendBubble(role, text) {
    if (welcomeEl && welcomeEl.parentNode === messagesEl) {
      messagesEl.removeChild(welcomeEl);
    }
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '👤' : '🎓';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${role === 'ai' ? renderMarkdown(text) : escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div.querySelector('.bubble');
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── Searching indicator ────────────────────────────── */
  function showSearching(bubbleEl) {
    const ind = document.createElement('div');
    ind.className = 'searching-indicator';
    ind.id = 'searching';
    ind.innerHTML = `<span>🔍 Searching the web</span><div class="dot-pulse"><span></span><span></span><span></span></div>`;
    bubbleEl.appendChild(ind);
    scrollToBottom();
  }
  function hideSearching(bubbleEl) {
    const ind = bubbleEl.querySelector('#searching');
    if (ind) ind.remove();
  }

  /* ── Send a message ─────────────────────────────────── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize(inputEl);

    appendBubble('user', text);
    history.push({ role: 'user', content: text });

    // AI bubble (streaming target)
    const aiBubble = appendBubble('ai', '');
    let accumulated = '';
    let searchShown = false;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            if (evt.type === 'searching' && !searchShown) {
              showSearching(aiBubble);
              searchShown = true;
            } else if (evt.type === 'text') {
              if (searchShown) { hideSearching(aiBubble); searchShown = false; }
              accumulated += evt.content;
              aiBubble.innerHTML = renderMarkdown(accumulated);
              scrollToBottom();
            } else if (evt.type === 'done') {
              if (searchShown) hideSearching(aiBubble);
              history.push({ role: 'assistant', content: accumulated });
            } else if (evt.type === 'error') {
              aiBubble.innerHTML = `<em style="color:#ef4444">⚠ ${escapeHtml(evt.content)}</em>`;
            }
          } catch (_) {}
        }
      }
    } catch (err) {
      aiBubble.innerHTML = `<em style="color:#ef4444">⚠ ${escapeHtml(err.message)}</em>`;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  /* ── Voice input ────────────────────────────────────── */
  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Voice input is not supported in this browser. Try Chrome.');
      return;
    }
    if (isListening) {
      recognition && recognition.stop();
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('active');
      micBtn.title = 'Listening… click to stop';
    };
    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      inputEl.value = transcript;
      autoResize(inputEl);
    };
    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove('active');
      micBtn.title = 'Voice input';
    };
    recognition.onerror = () => {
      isListening = false;
      micBtn.classList.remove('active');
    };
    recognition.start();
  }
</script>
</body>
</html>
